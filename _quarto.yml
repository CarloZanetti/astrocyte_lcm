project:
  type: website
  output-dir: docs
  render:
    - "**/*.qmd"  # The double asterisk tells it to check subfolders
    - "!notebooks/test_normalisation.qmd"
    - "!notebooks/megena.qmd"
    - "!notebooks/02a_msstats.qmd"
    - "!notebooks/02b_msstats_plots.qmd"
    - "!notebooks/02c_msstats_abundance.qmd"

execute:
  freeze: auto
  
website:
  title: "Millie's Proteomics Project"
  sidebar:
    style: "docked"
    contents:
      - text: "1a. Initial QC"
